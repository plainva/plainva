# Secret-scan config for the CI Trivy step (picked up automatically:
# trivy-secret.yaml in the working directory is the --secret-config default).
#
# providerDefaults.ts ships Plainva's PUBLIC OAuth client identifiers — the
# OneDrive client id and the Dropbox app KEY of PKCE public clients. Public
# clients have no secret by design (RFC 8252); the identifiers are meant to be
# compiled into the app, exactly like every desktop OAuth client. Trivy's
# dropbox-api-secret rule pattern-matches ANY 15-char app key and flagged the
# key as HIGH (CI red since 2026-07-06, the day the central registrations
# landed). The allow rule is scoped to exactly that file (path is a Go regex),
# so real tokens anywhere else in the tree still fail the build.
allow-rules:
  - id: plainva-public-provider-ids
    description: Compiled-in public OAuth client identifiers (no secrets, RFC 8252 public clients)
    # Moved from apps/desktop to the shared UI package in the mobile M3 work
    # (both shells compile the same registrations in).
    path: packages/ui/src/services/providerDefaults\.ts$
