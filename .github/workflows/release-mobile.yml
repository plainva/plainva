name: Release Mobile

# Android release pipeline (M3E package K, ADR 0011 tag namespaces):
# an annotated `mobile-v*` tag builds the web assets, syncs Capacitor and
# produces a signed AAB + APK draft release. Signing is gated on secrets —
# without them the job builds an UNSIGNED release bundle as a build check
# (store uploads always need the signed path). iOS ships separately through
# the existing ios.yml TestFlight workflow (workflow_dispatch).
#
# Required secrets for signed builds:
#   ANDROID_KEYSTORE_BASE64   base64 of the release .jks/.keystore
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_ALIAS         key alias
#   ANDROID_KEY_PASSWORD      key password

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm --filter mobile build

      - name: Capacitor sync
        working-directory: apps/mobile
        run: npx cap sync android

      - name: Decode keystore
        id: keystore
        # The step always runs; the body decodes the keystore only when the
        # secret is set. (The `secrets` context is NOT available in `if:`
        # conditions, so guarding the step with it breaks the workflow parse.)
        working-directory: apps/mobile/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release bundle (signed when secrets exist)
        working-directory: apps/mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # A unique, increasing versionCode per run — the manifest's fixed 1
          # was already used by the first manual upload, and Play rejects a
          # duplicate versionCode. versionName (0.1.0) is unaffected.
          VERSION_CODE: ${{ github.run_number }}
        run: |
          # The gradle wrapper needs its execute bit on the Linux runner
          # (cap sync regenerates the android project; the checkout carries no
          # +x on Windows-authored files).
          chmod +x ./gradlew
          if [ -f release.keystore ]; then
            ./gradlew bundleRelease assembleRelease \
              -Pandroid.injected.version.code="$VERSION_CODE" \
              -Pandroid.injected.signing.store.file="$PWD/release.keystore" \
              -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          else
            echo "No signing secrets — building unsigned release as a build check."
            ./gradlew bundleRelease assembleRelease -Pandroid.injected.version.code="$VERSION_CODE"
          fi

      # Auto-upload to the Play internal test track when the service-account
      # secret exists (secrets are NOT allowed in `if:`, so gate on a step
      # output). The app must have been published once manually first — Play
      # only lets the API bespeak an app that already exists in a track.
      - name: Check Play upload secret
        id: play
        env:
          SA_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SA_JSON" ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload AAB to the Play internal test track
        if: steps.play.outputs.present == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.plainva.app
          releaseFiles: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Draft GitHub release with artifacts
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
            apps/mobile/android/app/build/outputs/apk/release/app-release*.apk
