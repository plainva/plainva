name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    # The action needs a writable token; without an explicit block the read-only
    # default token makes the committer-lookup GraphQL call fail ("Resource not
    # accessible by integration").
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: cla-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only needed when signatures live in a SEPARATE repository (remote-*
          # options). For same-repo signatures GITHUB_TOKEN suffices; if a PAT
          # is ever configured, scope it minimally (contents: write on the
          # signatures repo, nothing else).
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/plainva/plainva/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'bot*,dependabot*'
