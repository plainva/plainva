# iOS shell (P7): compile check on every dispatch, TestFlight upload on
# demand. The compile job needs NO signing or Apple account — it proves the
# Swift plugins and the Capacitor SPM setup build. The TestFlight job is
# gated behind an input and requires these repository secrets:
#   IOS_CERTIFICATE_P12_BASE64    - Apple Distribution certificate (.p12, base64)
#   IOS_CERTIFICATE_PASSWORD      - password of that .p12
#   IOS_PROVISIONING_PROFILE_BASE64 - App Store provisioning profile (base64)
#   APP_STORE_CONNECT_KEY_ID      - App Store Connect API key id
#   APP_STORE_CONNECT_ISSUER_ID   - App Store Connect issuer id
#   APP_STORE_CONNECT_KEY_BASE64  - the .p8 API key (base64)
name: iOS

on:
  workflow_dispatch:
    inputs:
      testflight:
        description: "Upload to TestFlight (requires signing secrets)"
        type: boolean
        default: false

jobs:
  build:
    name: Simulator build (no signing)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm --filter mobile build

      - name: Sync Capacitor iOS
        working-directory: apps/mobile
        run: npx cap sync ios

      - name: Build for simulator
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  testflight:
    name: TestFlight upload
    needs: build
    if: ${{ inputs.testflight }}
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm --filter mobile build

      - name: Sync Capacitor iOS
        working-directory: apps/mobile
        run: npx cap sync ios

      - name: Import signing certificate and profile
        env:
          CERT_B64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$CERT_B64" ]; then
            echo "::error::Signing secrets are not configured (see the header of this workflow)."
            exit 1
          fi
          KEYCHAIN=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 1800 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/plainva.mobileprovision

      - name: Prepare App Store Connect API key
        env:
          ASC_KEY_B64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8

      - name: Archive
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive"

      - name: Export and upload to TestFlight
        working-directory: apps/mobile/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/export.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/export.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8
