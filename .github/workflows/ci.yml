name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret Scanning (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scanners: 'secret'
          hide-progress: false
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true

      - name: npm audit (production dependencies)
        # npm retired the v1 audit endpoint (HTTP 410, July 2026) that `pnpm audit`
        # calls, so this step can no longer reach the registry. Keep it
        # non-blocking — Dependabot security alerts already cover npm advisories,
        # and cargo-audit + CodeQL still gate the rest. Re-tighten once pnpm uses
        # the bulk advisory endpoint.
        continue-on-error: true
        run: pnpm audit --prod --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Core tests
        run: pnpm --filter @plainva/core test

      - name: Desktop tests
        run: pnpm --filter desktop test

      # The mobile vitest suite (navigation reducer, save coordinator, dialogs,
      # pull-to-refresh, structure ratchet) previously ran only in the local
      # pre-push hook — a push without hooks had no mobile test coverage.
      - name: Mobile tests
        run: pnpm --filter mobile test

      - name: Desktop web build
        run: pnpm --filter desktop build

      - name: Install Playwright Browsers
        run: pnpm --filter desktop exec playwright install --with-deps chromium

      - name: E2E tests
        run: xvfb-run pnpm --filter desktop run test:e2e

      # Production-build smoke (v0.3.0 white-screen guard): the E2E suite above
      # runs ONLY against the Vite dev server, so production-only startup
      # failures — module init order, minification, code-splitting, CSP — are
      # structurally invisible to it (that class of bug shipped in v0.3.0). This
      # serves the bundle produced by "Desktop web build" via `vite preview` and
      # asserts the app boots and renders its first screen with no uncaught error.
      - name: Production build smoke
        run: xvfb-run pnpm --filter desktop run test:e2e:prod

  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      # tauri::generate_context! embeds frontendDist at compile time; the web
      # build does not run in this job, so provide an empty stand-in.
      - name: Provide frontend dist stub
        run: mkdir -p apps/desktop/dist

      - name: cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      # Lint gate (P5.6): warnings are errors so drift cannot accumulate.
      - name: cargo clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Ignored advisories have no actionable fix today (transitive, not reachable
      # by this app's runtime). Re-evaluate on the next major tauri/plist bump.
      #   RUSTSEC-2026-0194 / RUSTSEC-2026-0195: quick-xml DoS. Pinned to 0.39.x by
      #     `plist = "^0.39.2"` (via tauri); >=0.41 needs a tauri/plist major bump.
      #     plist only parses our own bundled Info.plist (macOS), never untrusted input.
      #   RUSTSEC-2023-0071: `rsa` Marvin attack. No fixed upstream release exists.
      #     Pulled via sqlx-mysql (tauri-plugin-sql); this app is SQLite-only, so the
      #     MySQL auth path that would exercise RSA never runs.
      - name: cargo audit
        run: cargo audit --file apps/desktop/src-tauri/Cargo.lock --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195 --ignore RUSTSEC-2023-0071
