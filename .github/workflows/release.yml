name: Release
on:
  push:
    tags:
      - 'v*'
  # Manual trigger to dry-run the pre-flight (lint + full test suite) on all
  # three platforms without cutting a release. The macOS leg of `pnpm test`
  # exercises the recursive fs.watch path (FSEvents), which the ubuntu-only CI
  # workflow never runs — this is the on-demand way to confirm that path stays
  # green. The release-cutting steps below are gated off for manual runs.
  workflow_dispatch:

jobs:
  release:
    # tauri-action creates the GitHub release and uploads the installers, which
    # needs write access to repository contents. Fresh repos default to a
    # read-only GITHUB_TOKEN, so grant it explicitly here.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    # Guard against a hung notarization: notarytool --wait can block for hours,
    # so cap the job — a stuck macOS build fails in ~1h instead of the 6h ceiling.
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xvfb

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Test Pre-flight
        run: |
          pnpm lint
          pnpm test

      # Production-build smoke before we cut installers (v0.3.0 shipped a
      # production-only white-screen). Run once on Linux: the web bundle under
      # test is OS-independent and the check runs in Playwright's Chromium, not
      # the platform webview, so a single leg covers all three installers.
      - name: Install Playwright Browsers (smoke)
        if: matrix.platform == 'ubuntu-22.04' && github.event_name != 'workflow_dispatch'
        run: pnpm --filter desktop exec playwright install --with-deps chromium

      - name: Production build smoke
        if: matrix.platform == 'ubuntu-22.04' && github.event_name != 'workflow_dispatch'
        run: xvfb-run pnpm --filter desktop run smoke:prod

      - name: Build Tauri App
        # Release-cutting step: only on a tag push. A manual workflow_dispatch
        # stops after the pre-flight above, so it never builds installers or
        # creates a draft release named after the branch ref.
        if: github.event_name != 'workflow_dispatch'
        # tauri-action v1 (migrated from v0). The inputs we use (tagName,
        # releaseName, releaseBody, releaseDraft, prerelease, args) are unchanged;
        # v1 only drops includeRelease/includeDebug/auto-init and renames
        # assetNamePattern (none of which we set). Note: v1's latest.json uses the
        # GitHub asset URL instead of browser_download_url — verified against a
        # throwaway pre-release so the in-app updater still resolves.
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing (Developer ID Application, team M3FGXPBLFZ): tauri-action
          # imports the base64 .p12 from APPLE_CERTIFICATE and signs the app. Only runs on
          # a tag push (this Build step is gated off for workflow_dispatch above).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarization is temporarily disabled: notarytool --wait hung indefinitely on
          # Apple's service for 0.4.0 (with both the old and freshly rotated credentials),
          # so builds are signed but not notarized (first launch on macOS: right-click ->
          # Open). Re-enable by restoring these two once notarization is confirmed working:
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Plainva ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
